<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GPA, CPA Calculator</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

<div class="container">

    <h1>GPA, CPA Calculator Server</h1>

    <div class="tabs">
        <button onclick="showLogin()">Đăng nhập</button>
        <button onclick="showRegister()">Đăng ký</button>
    </div>

    <div id="login" class="form-box">
        <h2>Đăng nhập</h2>
        <input type="text" id="loginUser" placeholder="Tên tài khoản">
        <input type="password" id="loginPass" placeholder="Mật khẩu">
        <button onclick="login()">Đăng nhập</button>
    </div>

    <div id="register" class="form-box" style="display:none">
        <h2>Đăng ký</h2>
        <input type="text" id="registerUser" placeholder="Tên tài khoản">
        <input type="password" id="registerPass" placeholder="Mật khẩu">
        <button onclick="register()">Đăng ký</button>
    </div>

</div>

<script>

    let User = ""
    let Pass = ""

    function showLogin(){
        document.getElementById("login").style.display = "block"
        document.getElementById("register").style.display = "none"
    }

    function showRegister(){
        document.getElementById("login").style.display = "none"
        document.getElementById("register").style.display = "block"
    }

    function register(){

        let user = document.getElementById("registerUser").value
        let pass = document.getElementById("registerPass").value

        if(user === "" || pass === ""){
            alert("Vui lòng nhập đầy đủ thông tin")
            return
        }

        User = user
        Pass = pass

        alert("Đăng ký thành công")
    }

    function login(){

        let user = document.getElementById("loginUser").value
        let pass = document.getElementById("loginPass").value

        if(user === User && pass === Pass){
            alert("Đăng nhập thành công")
        }else{
            alert("Sai tài khoản hoặc mật khẩu")
        }

    }

</script>

</body>
</html>
